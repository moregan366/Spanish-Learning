<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<style>

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 30px;
}

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.nav a:hover, .nav a.active {
    background: #374151;
    color: white;
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.stat-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 120px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.progress-bar {
    height: 10px;
    background: #e5e7eb;
    border-radius: 10px;
    margin-bottom: 30px;
    overflow: hidden;
}

#progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(135deg, #22c55e, #4ade80);
}

/* BODY */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    display: flex;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 40px;
    width: 100%;
}

/* HEADER */
h1 {
    margin-bottom: 20px;
}

/* SETTINGS */
.settings {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

/* CARD */
.card-container {
    perspective: 1000px;
    display: flex;
    justify-content: center;
}

.flashcard {
    width: 400px;
    height: 220px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    cursor: pointer;
}

.flashcard.flip {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    backface-visibility: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.front {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
}

.back {
    background: white;
    color: #333;
    transform: rotateY(180deg);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BUTTONS */
.buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.primary {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
}

.secondary {
    background: #e5e7eb;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-weight: bold;
}

.correct { color: green; }
.wrong { color: red; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz" class="active">Quiz</a>
        <a href="/writing">Spanish Writing</a>
        <a href="/listening">Spanish Listening</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Quiz</h1>

<!-- STATS -->
<div class="stats">
    <div class="stat-box">
        <h3 id="reviewed">0</h3>
        <p>Reviewed</p>
    </div>
    <div class="stat-box">
        <h3 id="correct">0</h3>
        <p>Correct</p>
    </div>
    <div class="stat-box">
        <h3 id="streak">0 🔥</h3>
        <p>Streak</p>
    </div>
</div>

<div class="progress-bar">
    <div id="progress"></div>
</div>

<!-- SETTINGS -->
<div class="settings">
    Direction:
    <select id="mode">
        <option value="es-en">Spanish → English</option>
        <option value="en-es">English → Spanish</option>
    </select>

    &nbsp;&nbsp;

    Mode:
    <select id="typeMode">
        <option value="input">Type Answer</option>
        <option value="show">Show Answer</option>
    </select>
</div>

<!-- CARD -->
<div class="card-container">
    <div class="flashcard" id="card" onclick="flipCard()">
        <div class="card-face front" id="front"></div>
        <div class="card-face back" id="back"></div>
    </div>
</div>

<!-- INPUT -->
<input id="answer" placeholder="Type your answer">

<!-- BUTTONS -->
<div class="buttons">
    <button class="primary" onclick="checkAnswer()">Submit</button>
    <button class="secondary" onclick="flipCard()">Flip</button>
    <button class="secondary" onclick="nextCard()">Next</button>
    <button class="secondary" onclick="speak()">🔊</button>
</div>

<p class="result" id="result"></p>

</div>

<script>

let cards = [];
let current = null;

let reviewed = 0;
let correctCount = 0;
let streak = 0;

async function loadCards() {
    const res = await fetch('/cards');
    cards = await res.json();
    nextCard();
}

function nextCard() {
    current = cards[Math.floor(Math.random() * cards.length)];

    document.getElementById("card").classList.remove("flip");
    document.getElementById("result").innerText = "";
    document.getElementById("answer").value = "";

    const mode = document.getElementById("mode").value;

    document.getElementById("front").innerText =
        mode === "es-en" ? current.front : current.back;

    document.getElementById("back").innerText =
        mode === "es-en" ? current.back : current.front;
}

function flipCard() {
    document.getElementById("card").classList.toggle("flip");
}

function checkAnswer() {
    const mode = document.getElementById("mode").value;
    const user = document.getElementById("answer").value.toLowerCase().trim();

    const correct = mode === "es-en"
        ? current.back.toLowerCase()
        : current.front.toLowerCase();

    reviewed++;

    if (user === correct) {
        correctCount++;
        streak++;
        document.getElementById("result").innerHTML =
            "<span class='correct'>Correct!</span>";
    } else {
        streak = 0;
        document.getElementById("result").innerHTML =
            "<span class='wrong'>Wrong. Answer: " + correct + "</span>";
    }

    updateStats();
}

function updateStats() {
    document.getElementById("reviewed").innerText = reviewed;
    document.getElementById("correct").innerText = correctCount;
    document.getElementById("streak").innerText = streak + " 🔥";

    let percent = (correctCount / Math.max(reviewed, 1)) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

function speak() {
    const mode = document.getElementById("mode").value;

    const text = mode === "es-en"
        ? current.front
        : current.back;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "es-ES";

    speechSynthesis.speak(utterance);
}

loadCards();

</script>

</body>
</html>
