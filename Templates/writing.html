<!DOCTYPE html>
<html>
<head>
<title>Spanish Writing</title>

<style>

/* SIDEBAR (same as your quiz) */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img { width: 30px; }

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.nav a:hover, .nav a.active {
    background: #374151;
    color: white;
}

/* MAIN */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    display: flex;
}

.main {
    margin-left: 240px;
    padding: 40px;
    width: 100%;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* INPUT */
textarea {
    width: 100%;
    height: 100px;
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.primary {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
}

.secondary {
    background: #e5e7eb;
}

/* RESULT */
.result {
    margin-top: 10px;
    font-weight: bold;
}

.correct { color: green; }
.wrong { color: red; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz">Quiz</a>
        <a href="/writing" class="active">Spanish Writing</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Spanish Writing</h1>

<!-- SETUP SCREEN -->
<div id="setup" class="card">

    <h3>Select Topic</h3>
    <select id="topic" onchange="loadSavedStories()">
        <option>Travel</option>
        <option>Business</option>
        <option>Sport</option>
        <option>Daily Life</option>
    </select>

    <h3>Select Level</h3>
    <select id="level" onchange="loadSavedStories()">
        <option>A1</option>
        <option>A2</option>
        <option>B1</option>
        <option>B2</option>
        <option>C1</option>
        <option>C2</option>
    </select>

    <label>Tense:</label>
    <select id="tense" onchange="loadSavedStories()">
        <option value="present">Present</option>
        <option value="preterite">Preterite</option>
        <option value="imperfect">Imperfect</option>
        <option value="future">Future</option>
        <option value="mixed">Mixed</option>
    </select>

    <div id="savedStories" style="margin-top: 20px;"></div>

    <br><br>
    <button id="startBtn" class="primary" onclick="startWriting()">Start Writing</button>

</div>

<!-- WRITING AREA -->

<div id="writingArea" style="display:none;">

    <div id="charPicker" style="margin-bottom: 10px;">
      <button onclick="insertChar('á')">á</button>
      <button onclick="insertChar('é')">é</button>
      <button onclick="insertChar('í')">í</button>
      <button onclick="insertChar('ó')">ó</button>
      <button onclick="insertChar('ú')">ú</button>
      <button onclick="insertChar('ñ')">ñ</button>
      <button onclick="insertChar('ü')">ü</button>
      <button onclick="insertChar('¿')">¿</button>
      <button onclick="insertChar('¡')">¡</button>
    </div>

    <div class="card">
        <h3 id="cardText"></h3>

        <button onclick="speakText()" style="margin-bottom:10px;"> 🎤 Listen </button>

        <textarea id="answer" placeholder="Write in Spanish..."></textarea>

        <br>
        <button class="primary" onclick="checkAnswer()">Check</button>
        <button class="secondary" onclick="nextCard()">Next</button>

        <p id="result" class="result"></p>

        <button onclick="addToFlashcards()">⭐ Add to Flashcards</button>
    </div>

</div>

</div>

<script>
   
let story = [];
let index = 0;
let current = null;
let results = [];

speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
};
    
/* START */
async function startWriting() {
    const button = document.getElementById("startBtn");

    // 🔄 Loading state
    button.innerText = "Generating...";
    button.disabled = true;

    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const res = await fetch(`/generate_story?topic=${topic}&level=${level}&tense=${tense}`);
    story = await res.json();

    index = 0;

    document.getElementById("setup").style.display = "none";
    document.getElementById("writingArea").style.display = "block";

    loadCard();

        // ✅ Reset button
    button.innerText = "Start Writing";
    button.disabled = false;
}

/* LOAD CARD */
function loadCard() {
    current = story[index];

    document.getElementById("cardText").innerText = current.english;
    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
}

/* LOAD SAVED STORIES */
async function loadSavedStories() {
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const res = await fetch(`/get_stories?topic=${topic}&level=${level}&tense=${tense}`);
    const stories = await res.json();

    const container = document.getElementById("savedStories");
    container.innerHTML = "";

    stories.forEach(s => {
        const div = document.createElement("div");
        div.innerText = s.title;
        div.style.cursor = "pointer";

        div.onclick = () => {
            story = s.content;
            index = 0;

            document.getElementById("setup").style.display = "none";
            document.getElementById("writingArea").style.display = "block";

            loadCard();
        };

        container.appendChild(div);
    });
}

/* CHECK */
async function checkAnswer() {
    const user = document.getElementById("answer").value;

    const res = await fetch("/check_writing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user: user,
            correct: current.spanish
        })
    });

    const data = await res.json();
    
    const isCorrect = data.correct;

    results.push({
        correct: isCorrect,
        user: user,
        correctAnswer: current.spanish
    });

    document.getElementById("result").innerHTML =
        isCorrect
        ? "<span class='correct'>Correct</span>"
        : "<span class='wrong'>" + data.feedback + "</span>";
}

/* SPEAK TEXT */
function speakText() {
    const text = document.getElementById("cardText").innerText;

    const utterance = new SpeechSynthesisUtterance(text);

    // Try to use Spanish voice
    const voices = speechSynthesis.getVoices();
    const spanishVoice = voices.find(v => v.lang.startsWith("es"));

    if (spanishVoice) {
        utterance.voice = spanishVoice;
    }

    utterance.lang = "es-ES"; // Spanish

    speechSynthesis.cancel(); // stop previous speech if any
    speechSynthesis.speak(utterance);
}


/* INSERT CHARACTER */
function insertChar(char) {
    const input = document.getElementById("answer"); // 👈 your input id
    const start = input.selectionStart;
    const end = input.selectionEnd;

    input.value =
        input.value.substring(0, start) +
        char +
        input.value.substring(end);

    input.focus();
    input.selectionStart = input.selectionEnd = start + 1;
}
    
/* NEXT */
function nextCard() {
    index++;

    if (index < story.length) {
        loadCard();
    } else {
        completeStory(); // 🔥 ADD THIS
    }
}

/* ADD TO FLASHCARDS */
async function addToFlashcards() {
    await fetch("/add_flashcard", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            front: current.english,
            back: current.spanish
        })
    });

    alert("Added to flashcards ⭐");
}

/* COMPLETE STORY */
async function completeStory() {

    const res = await fetch("/complete_story", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            results: results,
            topic: document.getElementById("topic").value,
            level: document.getElementById("level").value,
            tense: document.getElementById("tense").value
        })
    });

    const data = await res.json();

    window.location.href = `/results?score=${data.score}&feedback=${encodeURIComponent(data.feedback)}`;
}


window.onload = loadSavedStories;
    
</script>

</body>
</html>
