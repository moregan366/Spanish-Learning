<!DOCTYPE html>
<html>
<head>
<title>Spanish Listening</title>

<style>

/* SAME SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img { width: 30px; }

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.nav a:hover, .nav a.active {
    background: #374151;
    color: white;
}

/* MAIN */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    display: flex;
}

.main {
    margin-left: 240px;
    padding: 40px;
    width: 100%;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 15px;
}

.primary {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
}

.dictation-box {
    width: 100%;
    height: 120px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    line-height: 1.5;
    resize: vertical;
}

.dictation-box:focus {
    outline: none;
    border-color: #ec4899;
    box-shadow: 0 0 0 2px rgba(236,72,153,0.2);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz">Quiz</a>
        <a href="/writing">Spanish Writing</a>
        <a href="/listening" class="active">Spanish Listening</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Spanish Listening</h1>

<div id="setup" class="card">

    <div class="card" style="margin-top:20px; border-left:6px solid #3b82f6;">
        <h3>📰 Spanish News Listening</h3>
        <button class="primary" onclick="startNewsListening()">🎧 Start News Report</button>
    </div>

    <h3>Select Topic</h3>
    <select id="topic">
        <option>Travel</option>
        <option>Business</option>
        <option>Sport</option>
        <option>Daily Life</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
        <option>A1</option>
        <option>A2</option>
        <option>B1</option>
        <option>B2</option>
        <option>C1</option>
        <option>C2</option>
    </select>

    <h3>Select Tense</h3>
    <select id="tense">
        <option value="present">Present</option>
        <option value="preterite">Preterite</option>
        <option value="imperfect">Imperfect</option>
        <option value="future">Future</option>
        <option value="mixed">Mixed</option>
    </select>

    <h3>Voice</h3>
    <select id="voiceEngine" onchange="toggleVoiceOptions()">
        <option value="standard">Standard</option>
        <option value="elevenlabs">ElevenLabs</option>
    </select>

    <div id="elevenlabsOptions" style="display:none;">
        <select id="voiceGender">
            <option value="female">Female</option>
            <option value="male">Male</option>
        </select>
    </div>

    <button id="startBtn" class="primary" onclick="startListening()">
        Start Listening
    </button>

</div>

<div id="storiesList"></div>

<div id="listeningArea" style="display:none;">
    <div class="card">

        <button onclick="playCurrent()">▶️ Play</button>

        <textarea id="dictation" class="dictation-box"></textarea>

        <button onclick="checkDictation()">Check</button>
        <button onclick="nextListening()">Next</button>
        <button onclick="exitListening()">Exit</button>

        <p id="feedback"></p>

    </div>
</div>

<script>

let listeningStory = [];
let currentIndex = 0;
let currentStoryId = null;
let results = [];

// ---------------- START LISTENING ----------------
async function startListening() {

    const btn = document.getElementById("startBtn");
    btn.innerText = "Generating...";
    btn.disabled = true;

    const voice = document.getElementById("voiceEngine").value;
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const res = await fetch(`/generate_listening?topic=${topic}&level=${level}&tense=${tense}&voice=${voice}`);
    const data = await res.json();

    listeningStory = data.sentences;
    currentStoryId = data.id;
    currentIndex = 0;
    results = [];

    document.getElementById("setup").style.display = "none";
    document.getElementById("listeningArea").style.display = "block";

    if (data.voice === "elevenlabs" && data.audio) {
        new Audio("data:audio/mpeg;base64," + data.audio).play();
    } else {
        playCurrent();
    }

    btn.innerText = "Start Listening";
    btn.disabled = false;
}

// ---------------- NEWS ----------------
async function startNewsListening() {

    const res = await fetch("/generate_news");
    const data = await res.json();

    listeningStory = data.sentences;
    currentStoryId = data.id;
    currentIndex = 0;
    results = [];

    document.getElementById("setup").style.display = "none";
    document.getElementById("listeningArea").style.display = "block";

    if (data.voice === "elevenlabs" && data.audio) {
        new Audio("data:audio/mpeg;base64," + data.audio).play();
    } else {
        playCurrent();
    }
}

// ---------------- SPEECH ----------------
function speakSpanish(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "es-ES";
    speechSynthesis.speak(utterance);
}

function playCurrent() {
    if (!listeningStory.length) return;

    let sentence = listeningStory[currentIndex];
    if (typeof sentence === "object") sentence = sentence.spanish;

    speakSpanish(sentence);
}

// ---------------- CHECK ----------------
async function checkDictation() {

    const user = document.getElementById("dictation").value;
    let correct = listeningStory[currentIndex];

    if (typeof correct === "object") correct = correct.spanish;

    const res = await fetch("/check_writing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user, correct })
    });

    const data = await res.json();

    document.getElementById("feedback").innerText =
        data.correct ? "Correct ✅" : data.feedback;
}

// ---------------- NEXT ----------------
function nextListening() {
    currentIndex++;
    if (currentIndex < listeningStory.length) {
        document.getElementById("dictation").value = "";
        playCurrent();
    } else {
        alert("Finished!");
    }
}

// ---------------- EXIT ----------------
function exitListening() {
    location.reload();
}

// ---------------- UI ----------------
function toggleVoiceOptions() {
    const engine = document.getElementById("voiceEngine").value;
    document.getElementById("elevenlabsOptions").style.display =
        engine === "elevenlabs" ? "block" : "none";
}

</script>

</body>
</html>
