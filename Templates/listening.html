<!DOCTYPE html>
<html>
<head>
<title>Spanish Listening</title>

<style>

/* SAME SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img { width: 30px; }

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.nav a:hover, .nav a.active {
    background: #374151;
    color: white;
}

/* MAIN */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    display: flex;
}

.main {
    margin-left: 240px;
    padding: 40px;
    width: 100%;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 15px;
}

.primary {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz">Quiz</a>
        <a href="/writing">Spanish Writing</a>
        <a href="/listening" class="active">Spanish Listening</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Spanish Listening</h1>

<div id="setup" class="card">

    <h3>Select Topic</h3>
    <select id="topic">
        <option>Travel</option>
        <option>Business</option>
        <option>Sport</option>
        <option>Daily Life</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
        <option>A1</option>
        <option>A2</option>
        <option>B1</option>
        <option>B2</option>
        <option>C1</option>
        <option>C2</option>
    </select>

    <h3>Select Tense</h3>
    <select id="tense">
        <option value="present">Present</option>
        <option value="preterite">Preterite</option>
        <option value="imperfect">Imperfect</option>
        <option value="future">Future</option>
        <option value="mixed">Mixed</option>
    </select>

    <br><br>

    <button class="primary" onclick="startListening()">
        Start Listening
    </button>

</div>

<!-- 🎧 LISTENING AREA (THIS IS WHAT YOU WERE MISSING) -->
<div id="listeningArea" style="display:none;">

    <div class="card">

        <h3 id="listeningText">Listen carefully...</h3>

        <!-- 🔊 Play -->
        <button onclick="playCurrent()">▶️ Play</button>

        <!-- ✍️ Dictation -->
        <textarea id="dictation" placeholder="Type what you hear..."></textarea>

        <br>

        <button onclick="checkDictation()" class="primary">Check</button>
        <button onclick="nextListening()" class="secondary">Next</button>
        <button onclick="exitListening()" class="secondary">Exit</button>

        <p id="feedback"></p>

    </div>

</div>

<script>

async function startListening() {
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const res = await fetch(`/generate_listening?topic=${topic}&level=${level}&tense=${tense}`);
    const sentences = await res.json();

    // 🔥 SHOW LISTENING UI
    document.getElementById("setup").style.display = "none";
    document.getElementById("listeningArea").style.display = "block";

    // reset
    listeningStory = sentences;
    currentIndex = 0;

    playCurrent();
}

function speakSpanish(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "es-ES";

    const voices = speechSynthesis.getVoices();
    const spanishVoice = voices.find(v => v.lang.startsWith("es"));

    if (spanishVoice) {
        utterance.voice = spanishVoice;
    }

    speechSynthesis.speak(utterance);
}

let currentIndex = 0;
let listeningStory = [];

function playListening(sentences) {
    listeningStory = sentences;
    currentIndex = 0;

    playCurrent();
}

function playCurrent() {
    const sentence = listeningStory[currentIndex];
    speakSpanish(sentence);
}

async function checkDictation() {
    const user = document.getElementById("dictation").value;
    const correct = listeningStory[currentIndex];

    const res = await fetch("/check_writing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user, correct })
    });

    const data = await res.json();

    document.getElementById("feedback").innerText =
        data.correct ? "Correct ✅" : data.feedback;
}

function nextListening() {
    currentIndex++;

    if (currentIndex < listeningStory.length) {
        document.getElementById("dictation").value = "";
        document.getElementById("feedback").innerText = "";
        playCurrent();
    } else {
        alert("Finished 🎉");
        location.reload();
    }
}

</script>

</body>
</html>
