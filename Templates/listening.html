<!DOCTYPE html>
<html>
<head>
<title>Spanish Listening</title>

<style>
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}
.logo { font-size: 20px; font-weight: bold; margin-bottom: 40px; display: flex; gap: 10px; }
.logo img { width: 30px; }
.nav a { display: block; color: #9ca3af; margin: 10px 0; padding: 10px; border-radius: 8px; text-decoration: none; }
.nav a:hover, .nav a.active { background: #374151; color: white; }

body { margin: 0; font-family: Arial; background: #f5f7fb; display: flex; }
.main { margin-left: 240px; padding: 40px; width: 100%; }

.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; margin-top: 15px; }

.primary { background: linear-gradient(135deg, #f97316, #ec4899); color: white; }

.dictation-box {
    width: 100%;
    height: 120px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png"> Spanish
    </div>
    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz">Quiz</a>
        <a href="/writing">Spanish Writing</a>
        <a href="/listening" class="active">Spanish Listening</a>
    </div>
</div>

<div class="main">

<h1>Spanish Listening</h1>

<div id="setup" class="card">

    <div class="card" style="border-left:6px solid #3b82f6;">
        <h3>📰 Spanish News Listening</h3>
        <button class="primary" onclick="startNewsListening()" style="background:#3b82f6;">
        🎧 Start News Report
    </button>

    </div>

    <h3>Topic</h3>
    <select id="topic">
        <option>Travel</option>
        <option>Business</option>
        <option>Sport</option>
        <option>Daily Life</option>
    </select>

    <h3>Level</h3>
    <select id="level">
        <option>A1</option><option>A2</option><option>B1</option>
        <option>B2</option><option>C1</option><option>C2</option>
    </select>

    <h3>Tense</h3>
    <select id="tense">
        <option value="present">Present</option>
        <option value="preterite">Preterite</option>
        <option value="imperfect">Imperfect</option>
        <option value="future">Future</option>
        <option value="mixed">Mixed</option>
    </select>

    <h3>Voice</h3>
    <select id="voiceEngine" onchange="toggleVoiceOptions()">
        <option value="standard">Standard</option>
        <option value="elevenlabs">ElevenLabs</option>
    </select>

    <div id="elevenlabsOptions" style="display:none;">
        <select id="voiceGender">
            <option value="female">Female</option>
            <option value="male">Male</option>
        </select>
    </div>

    <button id="startBtn" class="primary" onclick="startListening()">
        Start Listening
    </button>

</div>

<div id="storiesList" style="margin-top:20px;"></div>

<div id="listeningArea" style="display:none;">
    <div class="card">
        <button onclick="playCurrent()">▶ Play</button>

        <textarea id="dictation" class="dictation-box"></textarea>

        <div>
            <button onclick="insertChar('á')">á</button>
            <button onclick="insertChar('é')">é</button>
            <button onclick="insertChar('ñ')">ñ</button>
        </div>

        <button onclick="checkDictation()">Check</button>
        <button onclick="nextListening()">Next</button>
        <button onclick="exitListening()">Exit</button>

        <p id="feedback"></p>
    </div>
</div>

<script>

let listeningStory = [];
let currentIndex = 0;
let currentStoryId = null;
let results = [];

// ---------------- START ----------------
async function startListening() {

    const btn = document.getElementById("startBtn");
    btn.innerText = "Generating...";
    btn.disabled = true;

    // ✅ FIXED: get all inputs properly
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const voiceEngine = document.getElementById("voiceEngine").value;
    const gender = document.getElementById("voiceGender")?.value;
    const country = document.getElementById("voiceCountry")?.value;
    let region = document.getElementById("voiceRegion")?.value;

    // ✅ STEP 6 (region logic)
    if (country !== "spain") {
        region = "";
    }

    // ✅ FIXED: send EVERYTHING to backend
    const res = await fetch(
        `/generate_listening?topic=${topic}&level=${level}&tense=${tense}&voice=${voiceEngine}&gender=${gender}&country=${country}&region=${region}`
    );

    const data = await res.json();

    // ✅ setup state
    listeningStory = data.sentences;
    currentStoryId = data.id;
    currentIndex = 0;
    results = [];

    // ✅ show UI
    showListeningUI();

    // 🔊 play audio
    playAudio(data);

    // ✅ reset button
    btn.innerText = "Start Listening";
    btn.disabled = false;
}

// ---------------- NEWS ----------------
async function startNewsListening() {

    const btn = event.target;
    btn.innerText = "Generating news...";
    btn.disabled = true;

    // ✅ ADD THESE (you were missing them)
    const voiceEngine = document.getElementById("voiceEngine").value;
    const gender = document.getElementById("voiceGender")?.value;
    const country = document.getElementById("voiceCountry")?.value;
    let region = document.getElementById("voiceRegion")?.value;

    // ✅ STEP 6 (fix region logic)
    if (country !== "spain") {
        region = "";
    }

    // ✅ FIXED: pass everything to backend
    const res = await fetch(
        `/generate_news?voice=${voiceEngine}&gender=${gender}&country=${country}&region=${region}`
    );

    const data = await res.json();

    listeningStory = data.sentences;
    currentStoryId = data.id;
    results = [];
    currentIndex = 0;

    showListeningUI();

    // 🔊 Play audio
    playAudio(data);

    // ✅ reset button
    btn.innerText = "Start News Report";
    btn.disabled = false;
}

// ---------------- AUDIO ----------------
function playAudio(data) {
    if (data.voice === "elevenlabs" && data.audio) {
        new Audio("data:audio/mpeg;base64," + data.audio).play();
    } else {
        playCurrent();
    }
}

// ---------------- PLAY ----------------
function playCurrent() {
    if (!listeningStory.length) return;
    let s = listeningStory[currentIndex];
    if (typeof s === "object") s = s.spanish;
    speechSynthesis.speak(new SpeechSynthesisUtterance(s));
}

// ---------------- CHECK ----------------
async function checkDictation() {
    let correct = listeningStory[currentIndex];
    if (typeof correct === "object") correct = correct.spanish;

    const res = await fetch("/check_writing", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user: dictationEl().value,
            correct
        })
    });

    const data = await res.json();

    feedbackEl().innerText =
        data.correct ? "Correct ✅" : data.feedback;
}

// ---------------- NEXT ----------------
function nextListening() {
    currentIndex++;
    if (currentIndex < listeningStory.length) {
        dictationEl().value = "";
        feedbackEl().innerText = "";
        playCurrent();
    } else {
        completeListening();
    }
}

// ---------------- COMPLETE ----------------
async function completeListening() {
    const res = await fetch("/complete_story", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            results,
            topic: topicEl().value,
            level: levelEl().value,
            tense: tenseEl().value
        })
    });
    const data = await res.json();
    window.location.href = `/results?score=${data.score}&feedback=${encodeURIComponent(data.feedback)}`;
}

// ---------------- EXIT ----------------
function exitListening() {
    location.reload();
}

// ---------------- STORIES ----------------
async function loadListeningStories() {
    const res = await fetch(`/get_stories?mode=listening&topic=${topicEl().value}&level=${levelEl().value}&tense=${tenseEl().value}`);
    const stories = await res.json();
    renderStories(stories);
}

function renderStories(stories) {

    const container = document.getElementById("storiesList");
    container.innerHTML = "";

    stories.forEach(s => {

        const div = document.createElement("div");
        div.className = "card";
        div.style.marginTop = "10px";

        const isComplete = s.score !== null && s.score !== undefined;

        div.innerHTML = `
            <b>${s.title}</b><br>

            ${isComplete
                ? `Score: ${s.score} ✅`
                : `In progress...`}

            <br><br>

            <button class="primary" onclick="resumeListening(${s.id})">
                ▶ ${isComplete ? "Replay" : "Resume"}
            </button>

            <button onclick="deleteStory(${s.id})"
                style="margin-left:10px; background:#ef4444; color:white;">
                🗑 Delete
            </button>
        `;

        container.appendChild(div);
    });
}

function resumeListening(id) {
    window.location.href = `/listening_resume?id=${id}`;
}

async function deleteStory(id) {
    if (!confirm("Delete?")) return;
    await fetch(`/delete_story/${id}`, {method:"DELETE"});
    loadListeningStories();
}

// ---------------- HELPERS ----------------
function insertChar(c){
    const t = dictationEl();
    t.value += c;
}

function toggleVoiceOptions(){
    document.getElementById("elevenlabsOptions").style.display =
        voiceEl().value === "elevenlabs" ? "block" : "none";
}

function showListeningUI(){
    document.getElementById("setup").style.display = "none";
    document.getElementById("storiesList").style.display = "none";
    document.getElementById("listeningArea").style.display = "block";
}

// shortcuts
const topicEl = () => document.getElementById("topic");
const levelEl = () => document.getElementById("level");
const tenseEl = () => document.getElementById("tense");
const voiceEl = () => document.getElementById("voiceEngine");
const dictationEl = () => document.getElementById("dictation");
const feedbackEl = () => document.getElementById("feedback");

// load stories on page load
window.onload = loadListeningStories;

</script>

</body>
</html>
