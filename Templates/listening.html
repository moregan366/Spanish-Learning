<!DOCTYPE html>
<html>
<head>
<title>Spanish Listening</title>

<style>

/* SAME SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #111827, #1f2937);
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img { width: 30px; }

.nav a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.nav a:hover, .nav a.active {
    background: #374151;
    color: white;
}

/* MAIN */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    display: flex;
}

.main {
    margin-left: 240px;
    padding: 40px;
    width: 100%;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 15px;
}

.primary {
    background: linear-gradient(135deg, #f97316, #ec4899);
    color: white;
}

/* MATCH WRITING PAGE TEXTBOX */
.dictation-box {
    width: 100%;
    height: 120px;
    margin-top: 15px;
    padding: 12px;

    border-radius: 10px;
    border: 1px solid #ddd;

    font-size: 16px;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;

    line-height: 1.5;
    resize: vertical;
}

/* Focus effect (nice UX touch) */
.dictation-box:focus {
    outline: none;
    border-color: #ec4899;
    box-shadow: 0 0 0 2px rgba(236,72,153,0.2);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="/">Flashcards</a>
        <a href="/quiz">Quiz</a>
        <a href="/writing">Spanish Writing</a>
        <a href="/listening" class="active">Spanish Listening</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Spanish Listening</h1>

<div id="setup" class="card">

    <h3>Select Topic</h3>
    <select id="topic">
        <option>Travel</option>
        <option>Business</option>
        <option>Sport</option>
        <option>Daily Life</option>
    </select>

    <h3>Select Level</h3>
    <select id="level">
        <option>A1</option>
        <option>A2</option>
        <option>B1</option>
        <option>B2</option>
        <option>C1</option>
        <option>C2</option>
    </select>

    <h3>Select Tense</h3>
    <select id="tense">
        <option value="present">Present</option>
        <option value="preterite">Preterite</option>
        <option value="imperfect">Imperfect</option>
        <option value="future">Future</option>
        <option value="mixed">Mixed</option>
    </select>

    <br><br>

    <button class="primary" onclick="startListening()">
        Start Listening
    </button>

</div>

<!-- 🎧 LISTENING AREA (THIS IS WHAT YOU WERE MISSING) -->
<div id="listeningArea" style="display:none;">

    <div class="card">

        <h3 id="listeningText">Listen carefully...</h3>

        <!-- 🔊 Play -->
        <button onclick="playCurrent()">▶️ Play</button>

        <!-- ✍️ Dictation -->
        <textarea id="dictation" class="dictation-box" placeholder="Type what you hear..."></textarea>

        <br>

        <button onclick="checkDictation()" class="primary">Check</button>
        <button onclick="nextListening()" class="secondary">Next</button>
        <button onclick="exitListening()" class="secondary">Exit</button>

        <p id="feedback"></p>

    </div>

</div>

<script>

let currentStoryId = null;
let results = [];
    
async function startListening() {
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;
    const tense = document.getElementById("tense").value;

    const res = await fetch(`/generate_listening?topic=${topic}&level=${level}&tense=${tense}`);
    const data = await res.json();

    // ✅ NEW
    listeningStory = data.sentences;
    currentStoryId = data.id;
    results = [];
    currentIndex = 0;

    // ✅ switch UI
    document.getElementById("setup").style.display = "none";
    document.getElementById("listeningArea").style.display = "block";

    playCurrent();
}

function speakSpanish(text) {
    speechSynthesis.cancel();

    const speak = () => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "es-ES";
        utterance.rate = 0.9;

        const voices = speechSynthesis.getVoices();

        let voice = voices.find(v => v.lang.startsWith("es"));

        if (!voice && voices.length > 0) {
            console.log("⚠️ No Spanish voice, using default");
            voice = voices[0];
        }

        if (voice) {
            utterance.voice = voice;
        }

        console.log("Speaking:", text);
        console.log("Voices available:", voices.length);

        speechSynthesis.speak(utterance);
    };

    // ✅ KEY FIX
    if (speechSynthesis.getVoices().length === 0) {
        speechSynthesis.onvoiceschanged = speak;
    } else {
        speak();
    }
}

let currentIndex = 0;
let listeningStory = [];

function playListening(sentences) {
    listeningStory = sentences;
    currentIndex = 0;

    playCurrent();
}

function playCurrent() {
    if (!listeningStory || listeningStory.length === 0) {
        console.log("❌ No sentences loaded");
        return;
    }

    const sentence = listeningStory[currentIndex];

    console.log("Current sentence:", listeningStory[currentIndex]);

    if (!sentence) {
        console.log("❌ No sentence at index", currentIndex);
        return;
    }

    speakSpanish(sentence);
}

async function checkDictation() {
    const user = document.getElementById("dictation").value;
    const correct = listeningStory[currentIndex];

    const res = await fetch("/check_writing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user, correct })
    });

    const data = await res.json();

    results.push({
        correct: data.correct,
        user: user,
        correctAnswer: correct
    });

    document.getElementById("feedback").innerText =
        data.correct ? "Correct ✅" : data.feedback;
}

function nextListening() {
    currentIndex++;

    if (currentIndex < listeningStory.length) {
        document.getElementById("dictation").value = "";
        document.getElementById("feedback").innerText = "";
        playCurrent();
    } else {
        completeListening(); // instead of alert
    }
}

async function exitListening() {

    if (!confirm("Exit and save progress?")) return;

    if (currentStoryId) {
        await fetch(`/save_progress/${currentStoryId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                index: currentIndex,
                results: results
            })
        });
    }

    document.getElementById("listeningArea").style.display = "none";
    document.getElementById("setup").style.display = "block";
}

async function completeListening() {

    const res = await fetch("/complete_story", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            results: results,
            topic: document.getElementById("topic").value,
            level: document.getElementById("level").value,
            tense: document.getElementById("tense").value
        })
    });

    const data = await res.json();

    window.location.href =
        `/results?score=${data.score}&feedback=${encodeURIComponent(data.feedback)}`;
}

</script>

</body>
</html>
