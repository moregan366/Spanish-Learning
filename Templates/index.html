<!DOCTYPE html>

<html>
<head>
    <title>Spanish Learning</title>

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    }

    .container {
        display: flex;
        height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
        width: 260px;
        background: linear-gradient(180deg, #0f172a, #020617);
        color: white;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 20px rgba(0,0,0,0.2);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 40px;
    }

    .logo img {
        width: 28px;
    }

    .nav a {
        display: block;
        padding: 12px;
        border-radius: 10px;
        color: #cbd5e1;
        text-decoration: none;
        margin-bottom: 10px;
        transition: 0.25s;
    }

    .nav a:hover {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        transform: translateX(6px);
    }

    /* MAIN */
    .main {
        flex: 1;
        padding: 50px;
    }

    h1 {
        font-size: 34px;
        margin-bottom: 30px;
        color: #0f172a;
    }

    /* ADD CARD BOX */
    .add-box {
        background: white;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        margin-bottom: 30px;
    }

    .inputs {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        transition: 0.2s;
    }

    input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
        outline: none;
    }

    .add-btn {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(99,102,241,0.4);
    }

    /* CARD LIST */
    .card-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .flashcard {
        background: white;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        transition: 0.3s;
        position: relative;
    }

    .flashcard:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .text {
        font-size: 18px;
        margin-bottom: 15px;
    }

    .text b {
        color: #111827;
    }

    .delete-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #ef4444;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    .delete-btn:hover {
        background: #dc2626;
    }

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="https://flagcdn.com/w40/es.png">
        Spanish
    </div>

    <div class="nav">
        <a href="#">Flashcards</a>
        <a href="#">Quiz</a>
    </div>
</div>

<!-- Main -->
<div class="main">
    <h1>Flashcards</h1>

    <div class="add-box">
        <h3>Add Flashcard</h3>

        <div class="inputs">
            <input id="front" placeholder="Spanish">
            <input id="back" placeholder="English">
            <button class="add-btn" onclick="addCard()">Add</button>
        </div>
    </div>

    <div class="card-list" id="cards"></div>
</div>

</div>

<script>
async function loadCards() {
    const res = await fetch('/cards');
    const data = await res.json();

    const container = document.getElementById('cards');
    container.innerHTML = '';

    data.forEach(card => {
        const div = document.createElement('div');
        div.className = 'flashcard';

        div.innerHTML = `
            <button class="delete-btn" onclick="deleteCard(${card.id})">Delete</button>
            <div class="text">
                <b>${card.front}</b><br>
                ${card.back}
            </div>
        `;

        container.appendChild(div);
    });
}

async function addCard() {
    const front = document.getElementById('front').value;
    const back = document.getElementById('back').value;

    if (!front || !back) return;

    await fetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ front, back })
    });

    document.getElementById('front').value = '';
    document.getElementById('back').value = '';

    loadCards();
}

async function deleteCard(id) {
    if (!confirm("Delete this card?")) return;

    await fetch(`/delete/${id}`, { method: 'DELETE' });
    loadCards();
}

loadCards();
</script>

</body>
</html>
:::
