<!DOCTYPE html>
<html>
<head>
    <title>Spanish Learning</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fb;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 15px 0;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: white;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
        }

        h1 {
            margin-top: 0;
        }

        /* Card container */
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Inputs */
        input {
            padding: 10px;
            margin-right: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            width: 200px;
        }

        /* Buttons */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            background: #2563eb;
            color: white;
        }

        .add-btn:hover {
            background: #1d4ed8;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        /* Flashcard item */
        .flashcard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .flashcard:hover {
            background: #eef2ff;
        }

        .text {
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🇪🇸 Spanish</h2>
        <a href="#">Flashcards</a>
        <a href="#">Quiz</a>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>Flashcards</h1>

        <!-- Add Card -->
        <div class="card">
            <h3>Add Flashcard</h3>

            <input id="front" placeholder="Spanish">
            <input id="back" placeholder="English">
            <button class="add-btn" onclick="addCard()">Add</button>
        </div>

        <!-- Cards -->
        <div class="card">
            <h3>Your Cards</h3>
            <div id="cards"></div>
        </div>

    </div>

</div>

<script>
async function loadCards() {
    const res = await fetch('/cards');
    const data = await res.json();

    const container = document.getElementById('cards');
    container.innerHTML = '';

    data.forEach(card => {
        const div = document.createElement('div');
        div.className = 'flashcard';

        div.innerHTML = `
            <div class="text">
                <b>${card.front}</b> - ${card.back}
            </div>
            <button class="delete-btn" onclick="deleteCard(${card.id})">Delete</button>
        `;

        container.appendChild(div);
    });
}

async function addCard() {
    const front = document.getElementById('front').value;
    const back = document.getElementById('back').value;

    await fetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ front, back })
    });

    document.getElementById('front').value = '';
    document.getElementById('back').value = '';

    loadCards();
}

async function deleteCard(id) {
    if (!confirm("Delete this card?")) return;

    await fetch(`/delete/${id}`, {
        method: 'DELETE'
    });

    loadCards();
}

loadCards();
</script>

</body>
</html>
