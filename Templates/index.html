<!DOCTYPE html>

<html>
<head>
    <title>Spanish Learning</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .container {
        display: flex;
        height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 240px;
        background: linear-gradient(180deg, #1e293b, #0f172a);
        color: white;
        padding: 25px;
        display: flex;
        flex-direction: column;
    }

    .logo {
        display: flex;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 40px;
    }

    .logo span {
        font-size: 24px;
        margin-right: 10px;
    }

    .sidebar a {
        color: #cbd5e1;
        text-decoration: none;
        margin: 12px 0;
        padding: 10px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #334155;
        color: white;
        transform: translateX(5px);
    }

    /* Main */
    .main {
        flex: 1;
        padding: 40px;
    }

    h1 {
        margin-top: 0;
        font-size: 28px;
    }

    /* Card UI */
    .card {
        background: white;
        padding: 25px;
        border-radius: 14px;
        margin-bottom: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Inputs */
    input {
        padding: 12px;
        margin-right: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        width: 200px;
        transition: 0.2s;
    }

    input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
    }

    /* Buttons */
    button {
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    .add-btn {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
    }

    .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(99,102,241,0.4);
    }

    .delete-btn {
        background: #ef4444;
        color: white;
    }

    .delete-btn:hover {
        background: #dc2626;
        transform: scale(1.05);
    }

    /* Flashcards */
    .flashcard {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f9fafb;
        padding: 14px 18px;
        border-radius: 10px;
        margin-bottom: 12px;
        transition: 0.3s;
        animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }

    .flashcard:hover {
        background: #eef2ff;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .text b {
        color: #1e293b;
    }

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <span>🇪🇸</span> Spanish
    </div>

    <a href="#">Flashcards</a>
    <a href="#">Quiz</a>
</div>

<!-- Main -->
<div class="main">

    <h1>Flashcards</h1>

    <!-- Add -->
    <div class="card">
        <h3>Add Flashcard</h3>

        <input id="front" placeholder="Spanish">
        <input id="back" placeholder="English">
        <button class="add-btn" onclick="addCard()">Add</button>
    </div>

    <!-- Cards -->
    <div class="card">
        <h3>Your Cards</h3>
        <div id="cards"></div>
    </div>

</div>

</div>

<script>
async function loadCards() {
    const res = await fetch('/cards');
    const data = await res.json();

    const container = document.getElementById('cards');
    container.innerHTML = '';

    data.forEach(card => {
        const div = document.createElement('div');
        div.className = 'flashcard';

        div.innerHTML = `
            <div class="text">
                <b>${card.front}</b> - ${card.back}
            </div>
            <button class="delete-btn" onclick="deleteCard(${card.id})">Delete</button>
        `;

        container.appendChild(div);
    });
}

async function addCard() {
    const front = document.getElementById('front').value;
    const back = document.getElementById('back').value;

    if (!front || !back) return;

    await fetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ front, back })
    });

    document.getElementById('front').value = '';
    document.getElementById('back').value = '';

    loadCards();
}

async function deleteCard(id) {
    if (!confirm("Delete this card?")) return;

    await fetch(`/delete/${id}`, { method: 'DELETE' });
    loadCards();
}

loadCards();
</script>

</body>
</html>
:::
